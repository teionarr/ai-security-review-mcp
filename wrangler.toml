name = "ai-security-review-mcp"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "SecurityReviewMCP"

# SQLite-backed Durable Objects are included in the Workers free tier.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SecurityReviewMCP"]

# Custom domain (uncomment after binding in the Workers dashboard).
# routes = [
#   { pattern = "mcp.example.com/*", custom_domain = true }
# ]

[observability]
enabled = true
